name: Deploy to AWS

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  EC2_STACK_NAME: ${{ vars.AWS_EC2_STACK_NAME || 'AwsInfra-Ec2Nginx' }}

# OIDC role needs: cloudformation:DescribeStacks; s3:PutObject on artifact bucket;
# codedeploy:ListDeployments (wait-until-idle), CreateDeployment, RegisterApplicationRevision,
# GetDeployment, GetDeploymentConfig, GetApplicationRevision.

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        run: |
          cd frontend
          npm ci
          VITE_BASE=/ npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve stack outputs
        id: stack
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "${EC2_STACK_NAME}" \
            --query "Stacks[0].Outputs[?OutputKey=='Ec2NginxArtifactBucketName'].OutputValue" \
            --output text)
          APP=$(aws cloudformation describe-stacks \
            --stack-name "${EC2_STACK_NAME}" \
            --query "Stacks[0].Outputs[?OutputKey=='CodeDeployAppName'].OutputValue" \
            --output text)
          DG=$(aws cloudformation describe-stacks \
            --stack-name "${EC2_STACK_NAME}" \
            --query "Stacks[0].Outputs[?OutputKey=='CodeDeployDeploymentGroupName'].OutputValue" \
            --output text)
          if [[ -z "$BUCKET" || "$BUCKET" == "None" ]]; then
            echo "::error::Missing Ec2NginxArtifactBucketName on stack ${EC2_STACK_NAME}"
            exit 1
          fi
          if [[ -z "$APP" || "$APP" == "None" || -z "$DG" || "$DG" == "None" ]]; then
            echo "::error::Missing CodeDeploy outputs (CodeDeployAppName / CodeDeployDeploymentGroupName)."
            exit 1
          fi
          echo "bucket=${BUCKET}" >> "$GITHUB_OUTPUT"
          echo "app=${APP}"       >> "$GITHUB_OUTPUT"
          echo "dg=${DG}"         >> "$GITHUB_OUTPUT"

      - name: Create deployment bundle (zip)
        run: |
          zip -r /tmp/project-showcase.zip . \
            -x '*/.git/*' \
            -x '.git/*' \
            -x 'frontend/*' \
            -x '*.pyc' \
            -x '*__pycache__/*' \
            -x '.venv/*'
          echo "Bundle size: $(du -sh /tmp/project-showcase.zip | cut -f1)"

      - name: Upload bundle to S3
        id: upload
        env:
          BUCKET: ${{ steps.stack.outputs.bucket }}
        run: |
          KEY="project-showcase/releases/${GITHUB_SHA}.zip"
          aws s3 cp /tmp/project-showcase.zip "s3://${BUCKET}/${KEY}"
          echo "key=${KEY}" >> "$GITHUB_OUTPUT"

      - name: Wait until CodeDeploy deployment group is idle
        env:
          APP: ${{ steps.stack.outputs.app }}
          DG: ${{ steps.stack.outputs.dg }}
        run: |
          set -euo pipefail
          deadline=$((SECONDS + 3600))
          while (( SECONDS < deadline )); do
            if ! ids=$(aws deploy list-deployments \
              --application-name "${APP}" \
              --deployment-group-name "${DG}" \
              --include-only-statuses Created Queued InProgress Ready \
              --query 'deployments' \
              --output text 2>cd-list.err); then
              echo "list-deployments failed (see stderr). Add codedeploy:ListDeployments to OIDC role; cdk deploy AwsInfra-GitHubOidc."
              sed 's/^/  /' cd-list.err >&2 || true
              sleep 20
              continue
            fi
            rm -f cd-list.err
            if [[ -z "${ids}" || "${ids}" == "None" ]]; then
              echo "CodeDeploy deployment group is idle."
              exit 0
            fi
            echo "Active deployment ID(s): ${ids} — waiting 20s…"
            sleep 20
          done
          echo "Timed out after 1h. A deployment may be stuck — check CodeDeploy console or:" >&2
          echo "  aws deploy get-deployment --deployment-id <id-from-log-above>" >&2
          exit 1

      - name: Create CodeDeploy deployment
        id: deploy
        env:
          BUCKET: ${{ steps.stack.outputs.bucket }}
          S3_KEY: ${{ steps.upload.outputs.key }}
          APP:    ${{ steps.stack.outputs.app }}
          DG:     ${{ steps.stack.outputs.dg }}
        run: |
          set -euo pipefail
          DEPLOYMENT_ID=""
          for attempt in $(seq 1 30); do
            if DEPLOYMENT_ID=$(aws deploy create-deployment \
              --application-name "${APP}" \
              --deployment-group-name "${DG}" \
              --s3-location "bucket=${BUCKET},key=${S3_KEY},bundleType=zip" \
              --description "project-showcase sha=${GITHUB_SHA} ref=${GITHUB_REF_NAME}" \
              --query 'deploymentId' \
              --output text 2>cd.err); then
              rm -f cd.err
              break
            fi
            if grep -qF 'DeploymentLimitExceeded' cd.err 2>/dev/null; then
              echo "DeploymentLimitExceeded (race with another workflow); retry ${attempt}/30 in 25s…"
              sleep 25
              continue
            fi
            cat cd.err >&2
            exit 1
          done
          if [[ -z "${DEPLOYMENT_ID}" || "${DEPLOYMENT_ID}" == "None" ]]; then
            echo "Failed to create deployment after retries." >&2
            exit 1
          fi
          echo "deployment_id=${DEPLOYMENT_ID}" >> "$GITHUB_OUTPUT"
          echo "Created deployment: ${DEPLOYMENT_ID}"

      - name: Wait for deployment to succeed
        env:
          DEPLOYMENT_ID: ${{ steps.deploy.outputs.deployment_id }}
        run: |
          echo "Waiting for ${DEPLOYMENT_ID}…"
          aws deploy wait deployment-successful \
            --deployment-id "${DEPLOYMENT_ID}"
          echo "Deployment succeeded!"
